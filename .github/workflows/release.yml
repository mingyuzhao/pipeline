name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Configure Maven feed credentials
        run: |
          if [ -n "$MAVEN_REPO_USERNAME" ] && [ -n "$MAVEN_REPO_TOKEN" ]; then
            mkdir -p "$HOME/.m2"
            {
              echo '<settings>'
              echo '  <servers>'
              echo '    <server>'
              echo '      <id>TMMC-IS@Local</id>'
              echo "      <username>${MAVEN_REPO_USERNAME}</username>"
              echo "      <password>${MAVEN_REPO_TOKEN}</password>"
              echo '    </server>'
              echo '  </servers>'
              echo '</settings>'
            } > "$HOME/.m2/settings.xml"
          fi
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_TOKEN: ${{ secrets.MAVEN_REPO_TOKEN }}

      - name: Build with Maven release goals (prod)
        run: |
          MVN_SETTINGS=""
          if [ -f "$HOME/.m2/settings.xml" ]; then
            MVN_SETTINGS="-s $HOME/.m2/settings.xml"
          fi
          mvn $MVN_SETTINGS release:clean release:prepare release:perform \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.deploy.skip=true \
            -Dbenvironment=prod \
            -Darguments="-Dbenvironment=prod -Dmaven.test.skip=true -Dmaven.javadoc.skip=true -Dmaven.deploy.skip=true" \
            --debug --errors --batch-mode

      - name: Stage artifact files
        run: |
          mkdir -p artifact/dist artifact/config artifact/docker-config
          cp -R dist/tectris-ui/. artifact/dist/
          cp -R config/. artifact/config/
          cp -R target/classes/. artifact/docker-config/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tectris-ui
          path: artifact/
          if-no-files-found: error
